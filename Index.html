:root {

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, system-ui, sans-serif;

.header {

.tab { flex: 1; min-width: 60px; padding: 12px 6px; text-align: center; font-size: 11px; font-weight: 600; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.content { padding: 12px; }
.week-header { font-size: 13px; font-weight: 600; color: var(--text2); text-align: center; padding: 10px 0 8px; letter-spacing: 1px; text-transform: uppercase; }
.week-card { background: var(--bg2); border-radius: 12px; margin-bottom: 10px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
.week-card.today { border-color: var(--accent); }
.week-card-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; }
.week-day { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 2px; }
.week-session { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.week-bring { font-size: 12px; color: var(--text2); }
.week-leader { font-size: 11px; color: var(--blue); margin-top: 2px; }
.week-session-num { font-size: 28px; font-weight: 800; color: var(--bg3); line-height: 1; }
.week-card.today .week-session-num { color: var(--accent2); }
.week-nav { display: flex; justify-content: center; gap: 16px; padding: 8px 0; }
.week-nav button { background: var(--bg2); border: 1px solid var(--border); color: var(--text2); padding: 8px 20px; border-radius: 8px; font-size: 13px; cursor: pointer; }
.rotation { display: flex; justify-content: center; gap: 6px; padding: 12px 0; }
.rotation-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.rotation-dot.current { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.session-back { display: inline-flex; align-items: center; gap: 6px; color: var(--accent); font-size: 13px; font-weight: 600; padding: 8px 0; cursor: pointer; margin-bottom: 8px; }

.session-meta { font-size: 13px; color: var(--text2); margin-bottom: 8px; line-height: 1.8; }
.session-meta .leader-time { color: var(--blue); font-size: 13px; }
.format-options { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
.format-pill { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 6px 12px; border-radius: 20px; font-size: 12px; }
.format-pill.default { border-color: var(--accent); color: var(--accent); }
.warmup-toggle { background: var(--bg2); border-radius: 10px; padding: 12px 16px; margin: 8px 0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
.warmup-toggle .label { font-size: 14px; font-weight: 600; color: var(--text2); }
.warmup-toggle .arrow { color: var(--text2); font-size: 14px; transition: transform 0.2s; }
.warmup-toggle.open .arrow { transform: rotate(180deg); }
.warmup-content { display: none; padding: 8px 16px 12px; background: var(--bg2); border-radius: 0 0 10px 10px; margin-top: -8px; margin-bottom: 8px; border: 1px solid var(--border); border-top: none; }
.warmup-content.show { display: block; }
.warmup-item { font-size: 13px; color: var(--text2); padding: 3px 0; }
.mystery-card { background: var(--bg3); border-radius: 10px; padding: 16px; margin: 12px 0; text-align: center; border: 1px dashed var(--border); }
.mystery-card h3 { font-size: 14px; color: var(--accent); margin-bottom: 8px; }
.mystery-reveal { font-size: 18px; font-weight: 700; color: var(--text); min-height: 28px; margin-bottom: 8px; }
.mystery-btn { background: var(--accent); color: var(--bg); border: none; padding: 10px 24px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
.section-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }

.exercise-item { background: var(--bg2); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; border: 1px solid var(--border); }

function getTrainingDays(weekOffset = 0) {
  const today = new Date();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (today.getDay() || 7) + 1 + (weekOffset * 7));
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    if (CONFIG.trainingDays.includes(d.getDay() || 7)) days.push(new Date(d));
  }
  return days;
}

  check.setHours(0,0,0,0);
  const target = new Date(d); target.setHours(0,0,0,0);
  while (check <= target) {
    if (CONFIG.trainingDays.includes(check.getDay() || 7)) {
      if (check.getTime() === target.getTime()) return count % SESSIONS.length;
      count++;
    }
    check.setDate(check.getDate() + 1);
  }
  return count % SESSIONS.length;
}
function isToday(d) {
  const t = new Date();
  return d.getDate()===t.getDate() && d.getMonth()===t.getMonth() && d.getFullYear()===t.getFullYear();
}
function isFuture(d) {
  const t = new Date(); t.setHours(0,0,0,0);
  const c = new Date(d); c.setHours(0,0,0,0);
  return c > t;
}
function formatDay(d) {
  return d.toLocaleDateString('en-AU', { weekday:'short', day:'numeric', month:'short' });
}

// ═══════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════
let currentWeekOffset = 0;
let currentSessionView = 0;

function showTab(tab) {
  document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).style.display = 'block';
  const tabs = ['purpose','week','session','exercises','reference','matt','settings'];
  document.querySelectorAll('.tab')[tabs.indexOf(tab)].classList.add('active');
  if (tab === 'purpose') renderPurpose();
  if (tab === 'week') renderWeek();
  if (tab === 'session') renderSession(currentSessionView);
  if (tab === 'exercises') renderExercises();
  if (tab === 'reference') renderReference();
  if (tab === 'matt') renderMatts();
  if (tab === 'settings') renderSettings();
}

// ═══════════════════════════════════════════════
// WEEK VIEW
// ═══════════════════════════════════════════════
function renderWeek() {
  const days = getTrainingDays(currentWeekOffset);
  const container = document.getElementById('tab-week');
  const d0 = days[0] || new Date();
  const monday = new Date(d0);
  monday.setDate(d0.getDate() - (d0.getDay()||7) + 1);
  const label = `Week of ${monday.getDate()} ${monday.toLocaleDateString('en-AU',{month:'short'})}`;

  let html = `<div class="week-header">${label}</div>`;
  days.forEach(d => {
    const idx = getSessionForDate(d);
    const s = SESSIONS[idx];
    const today = isToday(d);
    html += `
      <div class="week-card ${today?'today':''}" onclick="viewSession(${idx})">
        <div class="week-card-header">
          <div style="flex:1">
            <div class="week-day">${formatDay(d)}${today?' · TODAY':''}</div>
            <div class="week-session">${s.name}</div>
            <div style="font-size:12px;color:var(--text2);margin-bottom:4px">🎯 ${s.focus}</div>
            <div class="week-bring">🎒 ${s.bring}</div>
            <div class="week-leader">👤 ${s.leader} · ${CONFIG.startTime}</div>
          </div>
          <div style="text-align:right;padding-left:12px">
            <div class="week-session-num">${s.num}</div>
          </div>
        </div>
      </div>`;
  });

  // Rotation
  const todayDay = days.find(d => isToday(d));
  const todayIdx = todayDay ? getSessionForDate(todayDay) : -1;
  html += '<div class="rotation">';
  for (let i = 0; i < SESSIONS.length; i++) {
    html += `<div class="rotation-dot ${i===todayIdx?'current':''}">${i+1}</div>`;
  }
  html += '</div>';
  html += `
    <div class="week-nav">
      <button onclick="currentWeekOffset--; renderWeek()">← Prev</button>
      <button onclick="currentWeekOffset=0; renderWeek()">This Week</button>
      <button onclick="currentWeekOffset++; renderWeek()">Next →</button>
    </div>`;
  container.innerHTML = html;
}

function viewSession(idx) {
  currentSessionView = idx;
  showTab('session');
}

function revealMystery() {
  const pool = Math.random() > 0.5 ? MYSTERY_INDIVIDUAL : MYSTERY_TEAM;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  const label = pool === MYSTERY_INDIVIDUAL ? '🏃' : '🤝';
  document.getElementById('mystery-result').innerHTML = `${label} ${pick}`;
}

    </div>

    </div>`;

  // Activation
  html += `
    <div class="warmup-toggle open" onclick="toggleWarmup(this)">
      <span class="label">⚡ Individual Station</span>
      <span class="arrow">▼</span>
    </div>
    <div class="warmup-content show">
      ${s.activation.map(a => `<div class="warmup-item">· ${a}</div>`).join('')}

  // Circuit
  html += `

    </div>

  // Mystery
  html += `

      <h3>🎲 Matt's Mystery Exercise</h3>
      <div class="mystery-reveal" id="mystery-result"></div>
      <button class="mystery-btn" onclick="revealMystery()">Pick a Card</button>
    </div>`;

  // Nav
  html += `
    <div class="week-nav" style="margin-top:20px">
      <button onclick="viewSession(${(idx-1+SESSIONS.length)%SESSIONS.length})">← S${((idx-1+SESSIONS.length)%SESSIONS.length)+1}</button>
      <button onclick="viewSession(${(idx+1)%SESSIONS.length})">S${((idx+1)%SESSIONS.length)+1} →</button>
    </div>`;

  container.innerHTML = html;
}
